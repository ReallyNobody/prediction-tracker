# Continuous integration — lint + test on every push to main and every PR.
#
# Keeps the feedback loop under a minute so we never drift into the "oh, CI's
# broken, we'll fix it later" pattern. Runs on Python 3.11 to match the Render
# runtime (3.11.9); pinning the minor here keeps CI in lockstep with prod.
#
# What it checks:
#   1. `ruff check .`          — lint rules (E, F, W, I, UP, B, SIM, C4 per pyproject)
#   2. `ruff format --check .` — formatting drift (no auto-fix in CI)
#   3. `pytest -q`             — full test suite, SQLite-backed
#
# Note: we install the `[dev]` extras only, not `[prod]`. psycopg + gunicorn
# aren't needed for tests (SQLite) and save ~15s of wheel downloads per run.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest -q
