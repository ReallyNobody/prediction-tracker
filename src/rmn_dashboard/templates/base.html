<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}RMN Hurricane Dashboard{% endblock %}</title>
    <meta
      name="description"
      content="How hurricane risk is being priced, today, by the people who have to pay for it — translated for people who don't speak insurance."
    />
    <!--
      Editorial / sharing metadata.

      og:image is the 1200x630 PNG rendered from og-image.svg by
      scripts/build_og_png.py (Day 22). PNG is the universal
      denominator: Twitter requires raster for summary_large_image,
      and Facebook / LinkedIn / Slack / iMessage / Discord all render
      it cleanly. The SVG stays in /static/ as a secondary asset
      (sharper at high zoom) but isn't referenced from the meta tags
      because the safest single canonical card is one format.
    -->
    <meta name="author" content="Risk Market News" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://hurricane.riskmarketnews.com/" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, iMessage, Discord) -->
    <meta property="og:site_name" content="Risk Market News" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RMN Hurricane Dashboard" />
    <meta
      property="og:description"
      content="How hurricane risk is being priced, today, by the people who have to pay for it — translated for people who don't speak insurance."
    />
    <meta property="og:url" content="https://hurricane.riskmarketnews.com/" />
    <meta property="og:image" content="https://hurricane.riskmarketnews.com{{ url_for('static', path='/og-image.png') }}" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RMN Hurricane Dashboard — hurricane risk pricing, translated." />

    <!-- Twitter card. summary_large_image renders the 1200x630 PNG as
         a full-width preview (the larger of Twitter's two card sizes).
         twitter:image is required when summary_large_image is set. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RMN Hurricane Dashboard" />
    <meta
      name="twitter:description"
      content="How hurricane risk is being priced, today. Real-time forecasts, equities, prediction markets — translated."
    />
    <meta name="twitter:image" content="https://hurricane.riskmarketnews.com{{ url_for('static', path='/og-image.png') }}" />
    <meta name="twitter:image:alt" content="RMN Hurricane Dashboard — hurricane risk pricing, translated." />

    <!-- Tailwind via CDN (MVP only — compile step lands in Phase 2) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX for partial updates -->
    <script
      src="https://unpkg.com/htmx.org@1.9.12"
      integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
      crossorigin="anonymous"
    ></script>

    <!-- Plotly (charts wired in Week 2) -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <!--
      Leaflet — Panel 1 cone map. 1.9.4 is the current stable; SRI hashes
      are the ones published on the Leaflet download page. ~42KB gzipped
      for the JS, tiles come from OpenStreetMap (no API key).
    -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="anonymous"
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin="anonymous"
    ></script>

    <style>
      /* Minor readability tweaks on top of Tailwind's defaults */
      html { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }

      /* Panel min-height on desktop keeps the 6-panel grid visually
         even — without it, a sparse Cat-bond panel would float above
         a packed equity grid in the same row. On phone the panels
         stack one-per-row, so the floor would force unnecessary
         empty space. Apply the floor only at sm+ widths. */
      @media (min-width: 640px) {
        .panel-shell { min-height: 14rem; }
      }

      /* Leaflet needs an explicit height on its container. The cone
         map gets 24rem on desktop (matches the 2-col panel ratio) and
         shrinks to 18rem on phone where map controls would otherwise
         dominate the viewport. The WSP probability map is a full-
         width row and gets slightly more vertical room on desktop
         so basin-wide contours stay readable; on phone it shrinks
         in step with the cone map for the same reason. */
      #forecast-map { height: 18rem; }
      #landfall-map { height: 22rem; }
      @media (min-width: 768px) {
        #forecast-map { height: 24rem; }
        #landfall-map { height: 28rem; }
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8 flex items-baseline justify-between">
        <div>
          <p class="text-xs uppercase tracking-widest text-slate-500">
            Risk Market News
          </p>
          <h1 class="text-xl font-semibold text-slate-900 sm:text-2xl">
            Hurricane Dashboard
          </h1>
        </div>
        <nav class="text-sm text-slate-600">
          <span class="text-slate-400">{{ build_status }}</span>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-slate-200 bg-white mt-12">
      <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8 text-xs text-slate-500 flex justify-between">
        <span>© 2026 Risk Market News. Data sources: NHC, NAIC, SEC EDGAR, Plenum, Kalshi, Polymarket.</span>
        <span>v{{ version }}</span>
      </div>
    </footer>
  </body>
</html>
