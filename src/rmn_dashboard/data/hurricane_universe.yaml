  # --- LNG export infrastructure (Gulf Coast) -------------------------
  #
  # Day 40 carved LNG out from "utility" because the editorial story is
  # different: a hurricane shutting Sabine Pass or Cameron LNG moves
  # global gas prices through TTF / JKM / Henry Hub spreads, not just
  # the affected state's regulated rate base. The three names below
  # cover the three operating Gulf Coast LNG export franchises. SRE
  # was previously in this YAML as a utility (Oncor + CA gas) — moved
  # to the lng sector with notes refreshed to focus on Cameron / Port
  # Arthur LNG, which are the actual hurricane-exposure story for the
  # name. Oncor (TX transmission) + SDG&E (CA gas) remain in Sempra's
  # consolidated book but aren't the storm story.
  #
  # key_states are the terminal locations. ET's primary exposure today
  # is its Gulf Coast pipeline network rather than its Lake Charles LNG
  # project (still pre-operational on this revision date), so its
  # relevance is medium rather than high.

  - ticker: LNG
    name: Cheniere Energy
    sector: lng
    cik: null
    key_states: [LA, TX]
    hurricane_relevance: high
    notes: Sabine Pass (LA) + Corpus Christi (TX) — largest US LNG exporter. Direct landfall typically takes terminals offline 1-3 weeks.

  - ticker: ET
    name: Energy Transfer
    sector: lng
    cik: null
    key_states: [LA, TX]
    hurricane_relevance: medium
    notes: Lake Charles LNG (pre-operational) + Gulf Coast pipeline network. Pipeline disruption is the storm exposure today.

  # --- Cat bond ETFs --------------------------------------------------
  #
  # Panel 3 ("Hurricane risk capital") reads cat_bond_etf rows from this
  # section, alongside the pc_index row below. Tickers here are
  # publicly-traded ETFs holding catastrophe bonds — a public-data
  # proxy for the institutional Plenum / Swiss Re cat bond indices that
  # are gated behind Bloomberg / Artemis subscriptions.
  #
  # Editorial rule: empty key_states (cat bond books are global, same
  # convention as reinsurers). Panel 2 filters cat_bond_etf out of the
  # per-name equity grid; Panel 3 selects both cat_bond_etf and
  # pc_index as two rows of the same readout.

  - ticker: ILS
    name: Insurance-Linked Securities ETF
    sector: cat_bond_etf
    cik: null
    key_states: []
    hurricane_relevance: high
    notes: NYSE Arca-listed cat bond ETF; price moves with cat bond market repricing.

  # --- P&C insurance index ETF ----------------------------------------
  #
  # Day 20: KBWP ships alongside ILS in Panel 3 to give a second view of
  # how hurricane-risk capital is priced. Where ILS represents the
  # alternative-capital (cat bond) layer, KBWP tracks the listed P&C
  # insurance layer — the two combined give a tighter read on whether
  # a season's pricing is moving on the bond side, the equity side, or
  # both.
  #
  # No reinsurance counterpart yet: KBW publishes a Global Reinsurance
  # Index, but its investable trackers are foreign-listed and thin.
  # Individual reinsurer tickers (RNR / EG / ACGL / AXS / MKL / HG) in
  # the equity universe cover that layer through Panel 2's reinsurer
  # filter pill.
  #
  # Editorial rule: empty key_states (it's a basket, not a single-state
  # bet). Panel 2 filters pc_index out of its equity grid alongside
  # cat_bond_etf so the per-name tiles aren't diluted by index rows.

  - ticker: KBWP
    name: Invesco KBW Property & Casualty Insurance ETF
    sector: pc_index
    cik: null
    key_states: []
    hurricane_relevance: high
    notes: Tracks the KBW Nasdaq P&C Insurance Index — listed P&C carriers, hurricane-exposed.

  # --- Benchmark for Panel 2 utility-spread badge --------------------
  #
  # Day 40: XLU (Utilities Select Sector SPDR) is the broad utility-
  # sector ETF. Panel 2 computes each utility / LNG ticker's daily
  # change-percent minus XLU's, surfacing the result as a small "vs
  # XLU" badge on the tile. Editorial intent: separate name-specific
  # storm signal from broad sector sentiment, so a 4% drop in ETR on
  # a day XLU is also down 3.5% reads as 0.5% of name-specific risk
  # rather than panic.
  #
  # Editorial rule: never appears as a Panel 2 tile (sector="benchmark"
  # is filtered out alongside cat_bond_etf and pc_index). Empty
  # key_states. The yfinance ingest treats XLU like any other ticker
  # so we always have a fresh quote when the page loads.

  - ticker: XLU
    name: Utilities Select Sector SPDR
    sector: benchmark
    cik: null
    key_states: []
    hurricane_relevance: high
    notes: Broad utility-sector ETF; Panel 2 computes utility / LNG ticker spreads against XLU's daily move.
