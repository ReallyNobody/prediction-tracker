# =====================================================================
# hurricane_universe.yaml
# =====================================================================
#
# Curated list of US-listed equities with material Atlantic / Gulf /
# Caribbean hurricane exposure. Drives Panel 2 of the RMN Hurricane
# Dashboard: live price ticker (via yfinance) + cone-overlap highlight
# when Panel 1 has an active storm whose forecast touches a ticker's
# `key_states`.
#
# Authorship model:
#   * This file IS the source of truth; curate by hand.
#   * A nightly SEC EDGAR discovery job queries hurricane-adjacent SICs
#     (6331 Fire/Marine/Casualty, 1531 Operative Builders, 4911 Electric
#     Services, etc.) and flags filers NOT in this universe as an
#     editorial review queue — it never auto-inserts. (Discovery job is
#     post-launch; for now, review quarterly by hand.)
#   * Review quarterly against latest 10-K / Schedule T filings; lock
#     annually against new issuances, mergers, de-listings.
#
# Field definitions:
#   ticker                 NYSE / Nasdaq symbol.
#   name                   Common company name.
#   sector                 insurer | reinsurer | homebuilder |
#                          utility | lng | cat_bond_etf | pc_index |
#                          benchmark
#   cik                    SEC EDGAR Central Index Key. Null here —
#                          ingest resolves from
#                          https://www.sec.gov/files/company_tickers.json
#                          (post-launch; leave null for now).
#   key_states             Two-letter state abbrs where the company's
#                          hurricane-exposed business concentrates.
#                          Insurers: >~10% of DPW per Schedule T.
#                          Homebuilders: >~5% of community count / 10-K.
#                          Utilities: regulated service territory.
#                          Empty list = global book (reinsurers).
#   hurricane_relevance    high | medium | low — editorial weight,
#                          used for default Panel 2 sort + relevance
#                          badge.
#   notes                  One-line tooltip copy.
#
# Tickers in this revision: 40
#   - 11 insurers (3 FL-specialist + 8 national/commercial)
#   -  6 reinsurers
#   -  8 homebuilders
#   -  9 utilities (Day 40 moved SRE to LNG)
#   -  3 LNG export infrastructure (Day 40)
#   -  1 cat bond ETF (Panel 3)
#   -  1 P&C insurance index ETF (Panel 3)
#   -  1 benchmark ETF (XLU — Day 40, drives Panel 2 utility-spread badge)
# =====================================================================

